<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduStream — Register</title>
</head>
<body style="font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
             background: #f4f6f8; margin: 0; display: flex; min-height: 100vh;
             align-items: center; justify-content: center;">

  <div style="background: #fff; padding: 32px 36px; border-radius: 10px;
              box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 320px;">

    <h1 style="margin: 0 0 4px; font-size: 24px; color: #1a3d7c;">Create account</h1>
    <p style="margin: 0 0 24px; color: #6b7280; font-size: 14px;">
      Register a student account to access course videos.
    </p>

    {% if error %}
    <div style="background: #fdecea; color: #b71c1c; padding: 10px 12px;
                border-radius: 6px; font-size: 14px; margin-bottom: 16px;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <label style="display: block; font-size: 13px; color: #374151; margin-bottom: 4px;">
        Username
      </label>
      <input type="text" name="username" required autofocus minlength="3"
             value="{{ username or '' }}"
             style="width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #d1d5db;
                    border-radius: 6px; box-sizing: border-box; font-size: 14px;">

      <label style="display: block; font-size: 13px; color: #374151; margin-bottom: 4px;">
        Password <span style="color: #9ca3af;">(min 8 chars)</span>
      </label>
      <input type="password" name="password" required minlength="8"
             style="width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #d1d5db;
                    border-radius: 6px; box-sizing: border-box; font-size: 14px;">

      <label style="display: block; font-size: 13px; color: #374151; margin-bottom: 4px;">
        Confirm password
      </label>
      <input type="password" name="confirm" required minlength="8"
             style="width: 100%; padding: 10px; margin-bottom: 24px; border: 1px solid #d1d5db;
                    border-radius: 6px; box-sizing: border-box; font-size: 14px;">

      <button type="submit"
              style="width: 100%; padding: 11px; background: #1a3d7c; color: #fff;
                     border: none; border-radius: 6px; font-size: 15px; cursor: pointer;">
        Create account
      </button>
    </form>

    <p style="margin: 18px 0 0; font-size: 13px; color: #6b7280; text-align: center;">
      Already have an account? <a href="{{ url_for('login') }}" style="color: #1a3d7c;">Log in</a>
    </p>
  </div>
</body>
</html>
